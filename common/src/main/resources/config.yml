GarbageCollector:
  #How often should the plugin sweep up and remove tile entity blocks that no longer needs to be tracked
  #Measured in ticks, 20 ticks = 1 second
  #Adjust this if your server is unable to handle fast updates
  Period: 600

TileEntityUpdate:
  #The plugin will ignore players that are travelling faster than this speed
  #when updating tile entities
  #This is horizontal speed
  IgnoreMovementSpeed:
    Normal: 1.31
    Flying: 1.49
    Gliding: 1.23
  #The range in which tile entities in chunks around the player are checked
  #A range of 0 means only the chunk where the player is standing in is checked
  CheckingRange: 1

LightUpdate:
  #How often should the plugin update the light level a block that requires it is used
  #Only used if LightAPI is installed
  #Measured in ticks, 20 ticks = 1 second
  #Adjust this if your server is unable to handle fast light updates
  Period: 10

#Enable InteractionVisualizer for these blocks
#You might have to restart for changes to take effect
Blocks:
  Anvil:
    Enabled: true
  Banner:
    Enabled: true
    CheckingPeriod: 20
    Options:
      #Banners that matches will not have the display shown
      Blacklist:
        #Strip color codes when matching names
        StripColorWhenMatching: true
        #Regex name match
        List:
          - "Ominous Banner|block\\.minecraft\\.ominous_banner"
  Barrel:
    Enabled: true
  Beacon:
    Enabled: true
    #How often should the plugin check for block updates
    #Measured in ticks, 20 ticks = 1 second
    #Adjust this if your server is unable to handle fast updates / can handle faster updates
    CheckingPeriod: 20
    #How should the display text follow the player
    #Accepts FACE, SQUARE, CIRCLE
    PathType: "FACE"
  BeeHive:
    Enabled: true
    CheckingPeriod: 20
    Options:
      HoneyLevelCharacter: "\u2b1b"
      EmptyColor: "&7"
      FilledColor: "&e"
      NoCampfireColor: "&c"
      BeeCountText: "&e{Current}&6/{Max}"
  BeeNest:
    Enabled: true
    CheckingPeriod: 20
    Options:
      HoneyLevelCharacter: "\u2b1b"
      EmptyColor: "&7"
      FilledColor: "&e"
      NoCampfireColor: "&c"
      BeeCountText: "&e{Current}&6/{Max}"
  BlastFurnace:
    Enabled: true
    CheckingPeriod: 10
    Options:
      ProgressBarCharacter: "\u258e"
      EmptyColor: "&7"
      FilledColor: "&e"
      NoFuelColor: "&c"
      ProgressBarLength: 10
      AmountPending: " &7+{Amount}"
  BrewingStand:
    Enabled: true
    CheckingPeriod: 20
    Options:
      ProgressBarCharacter: "\u258e"
      EmptyColor: "&7"
      FilledColor: "&6"
      NoFuelColor: "&c"
      ProgressBarLength: 10
  Campfire:
    Enabled: true
    CheckingPeriod: 20
    Options:
      ProgressBarCharacter: "\u007c"
      EmptyColor: "&7"
      FilledColor: "&e"
      ProgressBarLength: 10
  CartographyTable:
    Enabled: true
  Chest:
    Enabled: true
  Conduit:
    Enabled: true
    CheckingPeriod: 20
    PathType: "CIRCLE"
  CraftingTable:
    Enabled: true
  Crafter:
    Enabled: true
    CheckingPeriod: 20
  Dispenser:
    Enabled: true
  DoubleChest:
    Enabled: true
  Dropper:
    Enabled: true
  EnchantmentTable:
    Enabled: true
    Options:
      # Paper supplies the localized Component for registered enchantments.
      # Add overrides here only for custom enchantments that do not provide one.
      CustomDefinedEnchantmentNames:
        "myplugin:mycustomenchant": "My Cool Enchant"
  EnderChest:
    Enabled: true
  Furnace:
    Enabled: true
    CheckingPeriod: 20
    Options:
      ProgressBarCharacter: "\u258e"
      EmptyColor: "&7"
      FilledColor: "&e"
      NoFuelColor: "&c"
      ProgressBarLength: 10
      AmountPending: " &7+{Amount}"
  Grindstone:
    Enabled: true
  Hopper:
    Enabled: true
  JukeBox:
    Enabled: true
    CheckingPeriod: 20
    Options:
      #Whether to have the name of the disc displayed or not
      ShowDiscName: true
  Lectern:
    Enabled: true
    CheckingPeriod: 20
    Options:
      Line1: "&e{Title}"
      Line2: "&7&o- {Author}"
  Loom:
    Enabled: true
  NoteBlock:
    Enabled: true
  ShulkerBox:
    Enabled: true
  SmithingTable:
    Enabled: true
  Smoker:
    Enabled: true
    CheckingPeriod: 10
    Options:
      ProgressBarCharacter: "\u258e"
      EmptyColor: "&7"
      FilledColor: "&e"
      NoFuelColor: "&c"
      ProgressBarLength: 10
      AmountPending: " &7+{Amount}"
  SoulCampfire:
    Enabled: true
    CheckingPeriod: 20
    Options:
      ProgressBarCharacter: "\u007c"
      EmptyColor: "&7"
      FilledColor: "&b"
      ProgressBarLength: 10
  Spawner:
    Enabled: true
    CheckingPeriod: 20
    PathType: "FACE"
    Options:
      ProgressBarCharacter: "\u258e"
      EmptyColor: "&c"
      FilledColor: "&a"
      ProgressBarLength: 10
      SpawnRange: " &f{SpawnRange}m"
  Stonecutter:
    Enabled: true

Entities:
  Item:
    Enabled: true
    Options:
      #Items that matches will not have the display shown
      Blacklist:
        #Strip color codes when matching names
        StripColorWhenMatching: true
        #Regex name match, material match, and optional custom item ID match
        #The first entry in each item on the list is a regex matching the item's name
        #The second entry is the material name
        #The optional third entry is an exact namespaced custom item ID resolved through
        #an installed custom-content bridge, for example a CraftEngine item ID
        List:
          - ["^ALTAR Probe.*", "NETHER_STAR"]
          - ["^Blacklisted Item$", "*"]
          #- [".*", "*", "mypack:ruby"]
      RegularFormat: "{Item} &bx{Amount} &6[{Timer}&6]"
      SingularFormat: "{Item} &6[{Timer}&6]"
      ToolsFormat: "{Item} &6[{Durability}&6]"
      #Vertical distance from the dropped item entity origin to its text label
      LabelYOffset: 0.8
      #Hide if there is more than this defined amount of item entities in one block
      Cramping: 6
      #How often the item display updates
      #This is in ticks (20 ticks = 1 second)
      #Setting this too low might impact performance
      UpdateRate: 20
      #Maximum distance in blocks at which a dropped-item label is kept active
      #Labels outside every eligible player's range are not spawned server-side
      ViewDistance: 64
      #Smooth label visibility bursts when entering areas with many dropped items
      VisibilityRateLimit:
        BucketSize: 128
        RestorePerTick: 32
      #Paper does not expose its internal per-item despawn rate. This value
      #drives the public-API timer (6000 ticks = 5 minutes).
      DespawnTicks: 6000
      Color:
        High: "&a"
        Medium: "&e"
        Low: "&c"
  Villager:
    Enabled: true

#Enable these modules for InteractionVisualizer displays
#ItemStand represents ItemDisplay-based workstation and item-frame visuals
#ItemDrop represents all displays using dropped items
#Hologram represents all TextDisplay-based labels
#OverridingDisabled accepts a list of entry keys
#Which force disables a module for a display type regardless of player preference
#An example of an entry key is "interactionvisualizer:crafting_table"
Modules:
  ItemStand:
    Enabled: true
    OverridingDisabled: []
  ItemDrop:
    Enabled: true
    OverridingDisabled: []
  Hologram:
    Enabled: true
    OverridingDisabled: []

Settings:
  #Whether everything should be disabled to the player by default
  DefaultDisableAll: false
  #Set to true if you are having async issues
  SendAllPacketsInSync: false
  UseHandSwingAnimation: true
  PickupAnimationPlayerYOffset: 0
  DisabledWorlds: []
  #MIGHT BE RESOURCE INTENSIVE
  #MIGHT BE RESOURCE INTENSIVE
  #MIGHT BE RESOURCE INTENSIVE
  HideIfViewObstructed: false

Options:
  Updater: true
  DownloadLanguageFiles: true
  
