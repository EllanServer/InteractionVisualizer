name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Java 25 build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks and build production jar
        run: ./gradlew clean check shadowJar --no-daemon --no-build-cache --rerun-tasks

      - name: Upload production jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InteractionVisualizer-${{ github.sha }}
          path: build/libs/InteractionVisualizer-*.jar
          if-no-files-found: error
          retention-days: 14
